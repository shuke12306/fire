name: Fire
options:
  minimumXcodeGenVersion: 2.45.3
packages:
  CrashReporter:
    url: https://github.com/microsoft/plcrashreporter.git
    exactVersion: 1.12.2
  ConfettiSwiftUI:
    url: https://github.com/simibac/ConfettiSwiftUI.git
    exactVersion: 3.0.0
  Nuke:
    url: https://github.com/kean/Nuke.git
    exactVersion: 12.8.0
  JXPhotoBrowser:
    url: https://github.com/JiongXing/PhotoBrowser.git
    exactVersion: 4.0.3
fileGroups:
  - Configs/Fire-Debug.xcconfig
  - Configs/Fire-Info.plist
  - Configs/FireWidget-Info.plist
  - Configs/Fire-Local-Debug.example.xcconfig
  - Configs/Fire-Local-Release.example.xcconfig
  - Configs/Fire-Release.xcconfig
  - Configs/Fire-Shared.xcconfig
  - Fire.entitlements
  - FireWidget.entitlements
schemes:
  Fire:
    build:
      targets:
        Fire: all
        FireTests:
          - test
    test:
      gatherCoverageData: false
      targets:
        - name: FireTests
          parallelizable: true
          randomExecutionOrder: true
settings:
  base:
    SWIFT_VERSION: "5.10"
targets:
  Fire:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Configs/Fire-Debug.xcconfig
      Release: Configs/Fire-Release.xcconfig
    sources:
      - path: App
        excludes:
          - Widgets/**
      - path: Sources/FireAppSession
      - path: Generated/FireUniFfi
        optional: true
        type: group
        buildPhase: sources
    dependencies:
      - sdk: Security.framework
      - sdk: Foundation.framework
      - sdk: CoreFoundation.framework
      - sdk: libiconv.tbd
      - package: CrashReporter
        product: CrashReporter
      - package: ConfettiSwiftUI
        product: ConfettiSwiftUI
      - package: Nuke
        product: Nuke
      - package: JXPhotoBrowser
        product: JXPhotoBrowser
      - framework: LocalPackages/TextureCore/Artifacts/AsyncDisplayKit.xcframework
        embed: true
        codeSign: true
      - target: FireWidgetExtension
        embed: true
    settings:
      base:
        CODE_SIGN_STYLE: $(FIRE_CODE_SIGN_STYLE)
        DEVELOPMENT_TEAM: $(FIRE_DEVELOPMENT_TEAM)
        FIRE_GIT_SHA: $(FIRE_GIT_SHA)
        CURRENT_PROJECT_VERSION: $(FIRE_BUILD_NUMBER)
        MARKETING_VERSION: $(FIRE_MARKETING_VERSION)
        PRODUCT_BUNDLE_IDENTIFIER: $(FIRE_PRODUCT_BUNDLE_IDENTIFIER)
        PROVISIONING_PROFILE_SPECIFIER: $(FIRE_PROVISIONING_PROFILE_SPECIFIER)
        CODE_SIGN_ENTITLEMENTS: Fire.entitlements
        PRODUCT_NAME: Fire
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Configs/Fire-Info.plist
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Generated/lib/$(PLATFORM_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lfire_uniffi"
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Generated"
    preBuildScripts:
      - path: scripts/sync_uniffi_bindings.sh
        name: Sync Fire UniFFI Bindings
        shell: /bin/bash
        showEnvVars: false
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/scripts/sync_uniffi_bindings.sh
          - $(SRCROOT)/../../Cargo.toml
          - $(SRCROOT)/../../Cargo.lock
          - $(SRCROOT)/../../rust
          - $(SRCROOT)/../../rust/crates/fire-uniffi/uniffi.toml
        outputFiles:
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_diagnostics.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_ldc.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_messagebus.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_notifications.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_search.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_session.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_topics.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_types.swift
          - $(SRCROOT)/Generated/FireUniFfi/fire_uniffi_user.swift
          - $(SRCROOT)/Generated/fire_uniffiFFI/fire_uniffiFFI.h
          - $(SRCROOT)/Generated/fire_uniffiFFI/module.modulemap
          - $(SRCROOT)/Generated/lib/$(PLATFORM_NAME)/libfire_uniffi.a
  FireWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Configs/Fire-Debug.xcconfig
      Release: Configs/Fire-Release.xcconfig
    sources:
      - path: App/Widgets
      - path: App/Shared/FireWidgetData.swift
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_STYLE: $(FIRE_CODE_SIGN_STYLE)
        DEVELOPMENT_TEAM: $(FIRE_DEVELOPMENT_TEAM)
        CURRENT_PROJECT_VERSION: $(FIRE_BUILD_NUMBER)
        MARKETING_VERSION: $(FIRE_MARKETING_VERSION)
        PRODUCT_BUNDLE_IDENTIFIER: $(FIRE_PRODUCT_BUNDLE_IDENTIFIER).widget
        CODE_SIGN_ENTITLEMENTS: FireWidget.entitlements
        PRODUCT_NAME: FireWidgetExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Configs/FireWidget-Info.plist
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
  FireTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Unit
    dependencies:
      - target: Fire
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Generated"
